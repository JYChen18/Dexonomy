epoch: 5
device: "cuda:0"

object:
  batch_size: 10
  init_point_num: 1024
  init_inplane_num: 8
  cfg_path: ${asset_root}/object/DGN_5k/processed_data/**/scene_cfg/floating/**.npy
  cfg_num: 100

matcher:
  opt_iter: 100
  filter:
    final_num: 10
    min_ratio: 0.5
    max_ratio: 0.9
    loss_based:
      enable: True
      pos_thre: 0.001
      normal_thre: 0.3
    collision_based: 
      enable: True
    qp_based: 
      enable: True
      batched: True
      max_batch_size: 30000
      threshold: 0.01
      miu_coef: [0.2, 0.001]    # This should be small to leave more high-quality grasps
    fps_based:
      enable: True
    

cust_log_dir: ${log_dir}
