exp_name: "debug"
asset_root: assets
save_root: output
save_dir: ${save_root}/${exp_name}_${hand_name}
skip: True
n_worker: 16    # used for MJTest and MJOpt
gpu_list: [4,5,6,7]  # only used for CSample

debug: False
debug_view: False
debug_render: False
template_name: "**"
obj_name: "**"

obj_mass: 0.1   # unit: kg
force_closure: True
has_floor_z0: False
override_ogd: True
update_template: "nearest"   # Choices: False, "body", "nearest", "arbi"
max_template_evolution: 2

# Path for hand annotation
raw_anno_dir: ${asset_root}/hand/${hand_name}/raw_anno
init_template_dir: ${asset_root}/hand/${hand_name}/template
hand_skeleton_path: ${asset_root}/hand/${hand_name}/collision_skeleton.yaml
hand_keypoint_path: ${asset_root}/hand/${hand_name}/anno_keypoint.yaml
hand_body_group_path: ${asset_root}/hand/${hand_name}/body_group.yaml

# Path for saving results
init_dir: ${save_dir}/initialization
grasp_dir: ${save_dir}/graspdata
succ_dir: ${save_dir}/succgrasp
new_template_dir: ${save_dir}/template
vis_3d_dir: ${save_dir}/vis_3d
vis_usd_dir: ${save_dir}/vis_usd

# Path for logs
log_id: 0     # Allow parallelize "syn_obj" task
log_dir: ${save_dir}/log/${task_name}_${log_id}
log_path: ${log_dir}/path_log.txt

defaults:
  - _self_
  - task: total
  - hand: shadow

task_name: ${hydra:runtime.choices.task}
hand_name: ${hydra:runtime.choices.hand}

hydra:
  run:
    dir: ${task.cust_log_dir}