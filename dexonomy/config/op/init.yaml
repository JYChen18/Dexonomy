epoch: 5
device: "cuda"  # or "cpu"

object:
  batch_size: 10
  n_init_point: 1024  # number of initial point sampling
  n_init_inplane: 8  # number of initial inplane rotation sampling
  cfg_path: ${asset_root}/object/DGN_5k/scene_cfg/**/floating/*.npy
  # cfg_path: ${asset_root}/object/DGN_5k/scene_cfg/sem_LightBulb_8338a18d589c26d21c648623457982d0/floating/*.npy
  n_cfg: 100  # number of scene cfg to run
  mass: ${obj_mass}

matcher:
  opt_step: 100

filter:
  general:
    n_final: 10  # number of final grasps to keep
    min_ratio: 0.5  # min ratio of valid grasps to keep for each filter
    max_ratio: 0.9  # max ratio of valid grasps to keep for each filter
  pose:
    thre: 0.1  # min dot product between finger direction and object position
  loss:
    pos_thre: 0.001  # max distance between hand contacts and object contacts, unit: m
    normal_thre: 0.3  # max angle between hand contacts and object contacts, unit: rad
  collision: 
    plane_thre: 0.02  # min distance between hand skeleton and plane, unit: m
  qp: 
    batch_size: 30000
    thre: 0.01  # max qp error for a valid grasp
    miu_coef: [0.2, 0.001]  # tangential and torsional friction coefficient
  fps:
    dist_thre: null

cust_log_dir: ${log_dir}
