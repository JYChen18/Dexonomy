grasp:
  device: "cpu"
  gpus: [0, 1, 2, 3] # only used when device is cuda
  process_per_gpu: 4 # only used when device is cuda
  step: 50
  substep: 10
  step_obj: 1
  step_hand: 1
  rho_admm: 1e3
  lr_obj: 2e-4
  square_res: False
  # for shadow hand dexonomy
  # step: 100
  # rho_admm: 1e2
  # square_res: True
  cdist: 0.001    # target hand-object contact distance
  fix_hand_local_cp: False
  opt_miu_coef: [0.1, 0]
  filter:
    limit:
      thre: 0.0  # max value out of the joint qpos limit
    collision: 
      hh_thre: 0.0  # min hand-hand distance for collision-free grasp
      ho_thre: 0.0  # min hand-object distance for collision-free grasp
    contact: 
      thre: 0.002  # max hand-object distance for a valid contact
      check_body: True  # check if the required contact bodies are in contact
    qp:
      thre: 0.001  # the qp error should be less than this threshold
      miu_coef: [0.6, 0.0]  # tangential and torsional friction coefficient
  
pregrasp:
  step: 20
  substep: 10  
  cdist: 0.045    # target hand-object contact distance
  filter:
    limit:
      thre: 0.0  # max value out of the joint qpos limit
    collision: 
      hh_thre: 0.0  # min hand-hand distance for collision-free pregrasp
      ho_thre: 0.04  # min hand-object distance for collision-free pregrasp

cust_log_dir: ${log_dir}